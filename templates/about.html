{% extends 'base.html' %}

{% block title %}About{% endblock %}

{% block content %}
<section class="section">
    <div class="container narrow">
        <div class="page-header text-center">
            <h1>{{ settings.about_title }}</h1>
            <p class="lead">{{ settings.tagline }}</p>
        </div>
        <div class="about-content prose">
            {{ settings.about_content|linebreaks }}
        </div>
        <div class="mission-box">
            <h2>Our Mission</h2>
            <p>{{ settings.mission|linebreaks }}</p>
        </div>
        <div class="about-cta">
            <a href="{% url 'downloads' %}" class="btn btn-primary">Explore Our Apps</a>
            <a href="{% url 'contact' %}" class="btn btn-outline">Get in Touch</a>
        </div>
    </div>
</section>
{% endblock %}
